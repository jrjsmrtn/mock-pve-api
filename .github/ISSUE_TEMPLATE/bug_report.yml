name: Bug Report
description: File a bug report to help us improve Mock PVE API
title: "[Bug]: "
labels: ["bug", "triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: How are you running Mock PVE API?
      options:
        - Docker container
        - Docker Compose
        - From source (mix)
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of Mock PVE API are you running?
      placeholder: "0.1.0, latest, commit hash"
    validations:
      required: true

  - type: dropdown
    id: pve-version
    attributes:
      label: Simulated PVE Version
      description: Which PVE version were you simulating?
      options:
        - "7.0"
        - "7.1" 
        - "7.2"
        - "7.3"
        - "7.4"
        - "8.0"
        - "8.1"
        - "8.2"
        - "8.3"
        - "9.0"
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Describe the issue you're experiencing
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Start mock server with '...'
        2. Send request to '...'
        3. See error '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output or error messages
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Your configuration (environment variables, docker-compose.yml, etc.)
      render: yaml

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem