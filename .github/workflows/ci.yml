name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: jrjsmrtn/mock-pve-api

jobs:
  test:
    name: Test (Elixir ${{matrix.elixir}} / OTP ${{matrix.otp}})
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        elixir: ['1.15', '1.16', '1.17']
        otp: ['26', '27']
        exclude:
          - elixir: '1.15'
            otp: '27'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-
      
      - name: Install dependencies
        run: mix deps.get
      
      - name: Check formatting
        run: mix format --check-formatted
      
      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors
      
      - name: Run tests
        run: mix test --cover
      
      - name: Generate documentation
        run: mix docs

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=pve7,enable={{is_default_branch}}
            type=raw,value=pve8,enable={{is_default_branch}}
            type=raw,value=pve9,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name != 'pull_request'
    
    services:
      mock-pve-7:
        image: jrjsmrtn/mock-pve-api:latest
        ports:
          - 8007:8006
        env:
          MOCK_PVE_VERSION: "7.4"
        options: >-
          --health-cmd "curl -f http://localhost:8006/api2/json/version || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      mock-pve-8:
        image: jrjsmrtn/mock-pve-api:latest
        ports:
          - 8008:8006
        env:
          MOCK_PVE_VERSION: "8.3"
        options: >-
          --health-cmd "curl -f http://localhost:8006/api2/json/version || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      mock-pve-9:
        image: jrjsmrtn/mock-pve-api:latest
        ports:
          - 8009:8006
        env:
          MOCK_PVE_VERSION: "9.0"
        options: >-
          --health-cmd "curl -f http://localhost:8006/api2/json/version || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Test PVE 7.4 API
        run: |
          curl -f http://localhost:8007/api2/json/version
          curl -f http://localhost:8007/api2/json/nodes
          curl -f http://localhost:8007/api2/json/cluster/status
      
      - name: Test PVE 8.3 API
        run: |
          curl -f http://localhost:8008/api2/json/version
          curl -f http://localhost:8008/api2/json/nodes
          curl -f http://localhost:8008/api2/json/cluster/sdn/zones
      
      - name: Test PVE 9.0 API
        run: |
          curl -f http://localhost:8009/api2/json/version
          curl -f http://localhost:8009/api2/json/nodes
          curl -f http://localhost:8009/api2/json/cluster/status