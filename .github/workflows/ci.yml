name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/jrjsmrtn/mock-pve-api

jobs:
  test:
    name: Test (Elixir ${{matrix.elixir}} / OTP ${{matrix.otp}})
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        elixir: ['1.15', '1.16', '1.17']
        otp: ['26', '27']
        exclude:
          - elixir: '1.15'
            otp: '27'
    
    env:
      MIX_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-test-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-test-${{ matrix.elixir }}-${{ matrix.otp }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile with warnings as errors
        run: mix compile --force --warnings-as-errors

      - name: Run tests
        run: mix test --cover

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      security-events: write
      id-token: write
      contents: read
      issues: read
      pull-requests: read
      checks: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.1
        with:
          results_file: scorecard-results.json
          results_format: json

      - name: Upload Scorecard results
        uses: actions/upload-artifact@v7
        with:
          name: scorecard-results
          path: scorecard-results.json
          retention-days: 90

  security-audit:
    name: Security Audit & SBOM Generation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17'
          otp-version: '27'
      
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-1.17-27-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-1.17-27-
      
      - name: Install dependencies
        run: mix deps.get
      
      - name: Install Syft for SBOM generation
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      
      - name: Install Grype for vulnerability scanning
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      
      - name: Generate SBOM files
        run: ./scripts/generate-sbom.sh --source
      
      - name: Run vulnerability scan
        run: |
          if [ -f sbom/source-spdx.json ]; then
            grype sbom:sbom/source-spdx.json -o json > sbom/vulnerabilities.json || true
            grype sbom:sbom/source-spdx.json -o table > sbom/vulnerabilities.txt || true
          fi
      
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sbom-files
          path: |
            sbom/*.json
            sbom/*.txt
            sbom/README.md
            sbom/metadata.json
          retention-days: 90
      
      - name: Upload SBOM to GitHub (on release)
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Upload SBOM files as release assets
          gh release upload ${{ github.ref_name }} sbom/source-spdx.json --clobber || true
          gh release upload ${{ github.ref_name }} sbom/source-cyclonedx.json --clobber || true
          gh release upload ${{ github.ref_name }} sbom/mix-dependencies.json --clobber || true

  container-build:
    name: Build Container Images
    runs-on: ubuntu-latest
    needs: [test, security-audit]
    permissions:
      contents: read
      packages: write
      id-token: write  # needed for cosign signing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign container image
        if: github.event_name != 'pull_request'
        run: cosign sign --yes "${IMAGE_NAME}@${DIGEST}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
      
      - name: Install Syft for container SBOM
        if: github.event_name != 'pull_request'
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      
      - name: Generate container SBOM
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p container-sbom
          # Generate SBOM for the built image
          syft ${{ env.IMAGE_NAME }}:latest -o spdx-json > container-sbom/container-spdx.json
          syft ${{ env.IMAGE_NAME }}:latest -o cyclonedx-json > container-sbom/container-cyclonedx.json
          syft ${{ env.IMAGE_NAME }}:latest -o table > container-sbom/container-packages.txt
      
      - name: Upload container SBOM artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: container-sbom-files
          path: |
            container-sbom/*.json
            container-sbom/*.txt
          retention-days: 90
      
      - name: Upload container SBOM to GitHub (on release)
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Upload container SBOM files as release assets
          gh release upload ${{ github.ref_name }} container-sbom/container-spdx.json --clobber || true
          gh release upload ${{ github.ref_name }} container-sbom/container-cyclonedx.json --clobber || true

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: container-build
    if: github.event_name != 'pull_request'
    
    services:
      mock-pve-7:
        image: ghcr.io/jrjsmrtn/mock-pve-api:latest
        ports:
          - 8007:8006
        env:
          MOCK_PVE_VERSION: "7.4"
        options: >-
          --health-cmd "curl -fk https://localhost:8006/api2/json/version || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

      mock-pve-8:
        image: ghcr.io/jrjsmrtn/mock-pve-api:latest
        ports:
          - 8008:8006
        env:
          MOCK_PVE_VERSION: "8.3"
        options: >-
          --health-cmd "curl -fk https://localhost:8006/api2/json/version || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

      mock-pve-9:
        image: ghcr.io/jrjsmrtn/mock-pve-api:latest
        ports:
          - 8009:8006
        env:
          MOCK_PVE_VERSION: "9.0"
        options: >-
          --health-cmd "curl -fk https://localhost:8006/api2/json/version || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

    steps:
      - name: Test PVE 7.4 API
        run: |
          curl -fk https://localhost:8007/api2/json/version
          curl -fk https://localhost:8007/api2/json/nodes
          curl -fk https://localhost:8007/api2/json/cluster/status

      - name: Test PVE 8.3 API
        run: |
          curl -fk https://localhost:8008/api2/json/version
          curl -fk https://localhost:8008/api2/json/nodes
          curl -fk https://localhost:8008/api2/json/cluster/sdn/zones

      - name: Test PVE 9.0 API
        run: |
          curl -fk https://localhost:8009/api2/json/version
          curl -fk https://localhost:8009/api2/json/nodes
          curl -fk https://localhost:8009/api2/json/cluster/status